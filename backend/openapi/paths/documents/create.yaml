operationId: createDocument
summary: Create document to db when file got uploaded in s3
requestBody:
  required: true
  content:
    application/json:
      schema:
        $ref: "../../schema/documents/CreateDocumentRequest.yaml"
responses:
  "201":
    description: Document created successfully
    content:
      application/json:
        schema:
          $ref: "../../schema/documents/CreateDocumentResponse.yaml"
  "400":
    description: Invalid request
    content:
      application/json:
        schema:
          $ref: "../../schema/documents/ErrorResponse.yaml"